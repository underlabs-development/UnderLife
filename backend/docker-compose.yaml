services:
  django:
    build:
      context: .
      dockerfile: docker/Dockerfile.development
      secrets:
        # to install dependencies from Google Package Registry
        - gcloud_credentials
    image: lexroom-backend:latest
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      - PYTHONUNBUFFERED=1
      # Django
      - DJANGO_SETTINGS_MODULE=lexroom_backend.settings
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/postgres
      - DJANGO_SECURE_SSL_REDIRECT=False
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1
      - CORS_ALLOWED_ORIGINS=http://localhost:8080,http://localhost:3000
      # avoid Google Secret Manager during submodule import
      - LOGFIRE_TOKEN=development
      # Google: To connect to services at runtime use a GCP service account
      - GOOGLE_APPLICATION_CREDENTIALS=/run/secrets/gcloud_service_account
      # LiteLLM
      - LITELLM_LOG=WARNING
      - LITELLM_LOCAL_MODEL_COST_MAP=True
    command: start-api
    ports:
      - 8080:8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthcheck"]
      interval: 2s
      timeout: 2s
      retries: 3
    secrets:
      # To connect to services at runtime use a GCP service account mounted as secret
      - gcloud_service_account
      #volumes:
      #- $HOME/Lexroom/secrets/lexroom-account-service.json:/lexroom-account-service.json:ro
      #- /app/.venv
      #- .:/app:z

  postgres:
    image: postgres:18.3-alpine3.23
    # Uncomment below line to load testing backend
    # command: postgres -c 'max_connections=25'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
    # set shared memory limit when using docker compose
    shm_size: 128mb
    env_file:
      - ./.env
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:

secrets:
  gcloud_credentials:
    file: ~/.config/gcloud/application_default_credentials.json
  gcloud_service_account:
    file: ~/Lexroom/secrets/lexroom-account-service.json
