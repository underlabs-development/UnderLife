name: Deploy backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch: {}

# Never run two deploys at once; let an in-flight one finish.
concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    # Runs on the self-hosted runner installed on the Ubuntu box.
    runs-on: [self-hosted, underfinance]
    steps:
      - name: Pull, migrate, restart
        # Run as the user that owns /opt/UnderLife, whatever user the runner is.
        run: sudo -u underfinance -H /opt/UnderLife/backend/deploy/deploy.sh
